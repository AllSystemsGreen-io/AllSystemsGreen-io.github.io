server {
    listen 80;
    listen [::]:80;
    server_name allsystemsgreen.io www.allsystemsgreen.io;

    root /var/www/allsystemsgreen.io/current;
    index index.html;

    access_log /var/log/nginx/allsystemsgreen.io.access.log;
    error_log /var/log/nginx/allsystemsgreen.io.error.log warn;

    server_tokens off;
    client_max_body_size 64k;

    add_header Content-Security-Policy "default-src 'self'; script-src 'none'; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'none'; object-src 'none'; base-uri 'self'; form-action 'none'; frame-ancestors 'none'; upgrade-insecure-requests" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Permissions-Policy "accelerometer=(), ambient-light-sensor=(), autoplay=(), camera=(), display-capture=(), encrypted-media=(), fullscreen=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), midi=(), payment=(), picture-in-picture=(), publickey-credentials-get=(), screen-wake-lock=(), serial=(), sync-xhr=(), usb=(), web-share=(), xr-spatial-tracking=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;

    error_page 404 /404.html;

    location = / {
        try_files /index.html =404;
        expires 5m;
    }

    location ^~ /.well-known/ {
        try_files $uri =404;
        expires 5m;
    }

    location / {
        try_files $uri $uri/ =404;
        expires 5m;
    }

    location ~ /\.(?!well-known/) {
        return 404;
    }

    location ~* \.(?:css|js|png|jpg|jpeg|gif|svg|webp|ico)$ {
        try_files $uri =404;
        expires 1y;
    }
}
